name: Release

on:
  push:
    tags: ["[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build

      - name: Package release assets
        run: |
          # Obsidian install zip: unpack into .obsidian/plugins/
          mkdir -p dist/better-store
          cp main.js manifest.json styles.css versions.json dist/better-store/
          (cd dist && zip -r "better-store-${GITHUB_REF_NAME}.zip" better-store)

          # Offline bundle: full source + prebuilt main.js + GitLab CI,
          # everything needed to host/build on an air-gapped GitLab.
          git archive --format=zip -o dist/source.zip HEAD
          mkdir -p dist/bundle
          (cd dist/bundle && unzip -q ../source.zip)
          cp main.js dist/bundle/
          (cd dist/bundle && zip -qr "../better-store-${GITHUB_REF_NAME}-offline-bundle.zip" .)

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Better Store $GITHUB_REF_NAME" \
            --generate-notes \
            main.js manifest.json styles.css versions.json .gitlab-ci.yml \
            "dist/better-store-${GITHUB_REF_NAME}.zip" \
            "dist/better-store-${GITHUB_REF_NAME}-offline-bundle.zip"
