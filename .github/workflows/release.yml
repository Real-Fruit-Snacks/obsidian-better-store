name: Release

on:
  push:
    tags: ["[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run check:svelte
      - run: npm test
      - run: npm run build

      # Cryptographic provenance so users can verify the assets were built
      # from this repository: gh attestation verify main.js -R <repo>
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      # The release body comes from CHANGELOG.md; a missing entry fails the
      # release so every version ships with real notes.
      - name: Extract changelog entry
        run: |
          awk "/^## \\[$GITHUB_REF_NAME\\]/{flag=1; next} /^## \\[/{flag=0} flag" CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::No CHANGELOG.md entry for $GITHUB_REF_NAME — add one before tagging."
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Better Store $GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            main.js manifest.json styles.css
