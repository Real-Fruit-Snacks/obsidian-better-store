# GitLab CI for self-hosted GitLab instances.
#
# Requirements on the runner:
#   - a node:20 image (or any runner with Node 20+)
#   - point npm at your instance's registry mirror if you use one
#     (npm config: registry=https://your-mirror/)
#
# The build job publishes the three files an Obsidian vault needs
# (main.js, manifest.json, styles.css) as artifacts.
# The pages job serves the docs/ site via GitLab Pages.

stages:
  - verify
  - build
  - deploy

default:
  image: node:20

verify:
  stage: verify
  script:
    - npm ci
    - npm run check
    - npm run check:svelte
    - npm test

build:
  stage: build
  script:
    - npm ci
    - npm run build
  artifacts:
    name: "better-store-$CI_COMMIT_REF_NAME"
    paths:
      - main.js
      - manifest.json
      - styles.css

pages:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - mkdir -p public
    - cp -r docs/. public/
  artifacts:
    paths:
      - public
