<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Better Store — the community plugin browser, polished">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#090c0d"/>
      <stop offset="1" stop-color="#0e1214"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- ===== Typographic header ===== -->
  <g font-family="Cascadia Code, Consolas, monospace" text-anchor="middle">
    <text x="600" y="122" font-size="19" letter-spacing="6" fill="#879994"><tspan fill="#63f2ab">&#10095;</tspan> OBSIDIAN PLUGIN</text>
    <text x="614" y="218" font-size="88" font-weight="700" letter-spacing="4" text-anchor="end" fill="#dce4df">BETTER</text>
    <text x="642" y="218" font-size="88" font-weight="700" letter-spacing="4" text-anchor="start" fill="#63f2ab">STORE</text>
    <text x="600" y="272" font-size="19" letter-spacing="4" fill="#879994">THE COMMUNITY PLUGIN BROWSER, POLISHED</text>
  </g>
  <line x1="420" y1="302" x2="780" y2="302" stroke="#2a363d" stroke-width="1"/>

  <!-- ===== Store window mockup ===== -->
  <g>
    <rect x="150" y="330" width="900" height="370" rx="10" fill="#0e1214" stroke="#2a363d"/>

    <!-- window chrome -->
    <circle cx="178" cy="356" r="5.5" fill="#39484f"/>
    <circle cx="200" cy="356" r="5.5" fill="#39484f"/>
    <circle cx="222" cy="356" r="5.5" fill="#39484f"/>
    <text x="248" y="360" font-family="Cascadia Code, monospace" font-size="11.5" letter-spacing="2" fill="#63736f">BETTER STORE &#8212; BROWSE</text>
    <line x1="150" y1="376" x2="1050" y2="376" stroke="#2a363d"/>

    <!-- tabs -->
    <g font-family="Cascadia Code, monospace" font-size="12" letter-spacing="1.5">
      <text x="176" y="400" fill="#63f2ab" font-weight="700">ALL</text>
      <rect x="176" y="406" width="26" height="2" fill="#63f2ab"/>
      <text x="232" y="400" fill="#879994">RECENT</text>
      <text x="310" y="400" fill="#879994">TRENDING</text>
      <text x="408" y="400" fill="#879994">INSTALLED</text>
      <text x="1024" y="400" fill="#63736f" text-anchor="end">&#8635; REFRESH</text>
    </g>

    <!-- sidebar -->
    <rect x="170" y="422" width="200" height="258" rx="8" fill="#13191c" stroke="#2a363d"/>
    <rect x="184" y="438" width="172" height="26" rx="5" fill="#182024" stroke="#2a363d"/>
    <text x="194" y="455" font-family="Cascadia Code, monospace" font-size="11" fill="#63736f"><tspan fill="#63f2ab">&#10095;</tspan> search&#8230;</text>

    <text x="184" y="494" font-family="Cascadia Code, monospace" font-size="9.5" letter-spacing="1.8" fill="#63736f">CATEGORIES</text>
    <!-- active chip -->
    <rect x="184" y="504" width="56" height="20" rx="4" fill="#63f2ab"/>
    <text x="212" y="518" font-family="Cascadia Code, monospace" font-size="10" fill="#07100d" text-anchor="middle" font-weight="700">TASKS</text>
    <!-- inactive chips -->
    <g font-family="Cascadia Code, monospace" font-size="10" fill="#879994" text-anchor="middle">
      <rect x="248" y="504" width="34" height="20" rx="4" fill="none" stroke="#2a363d"/>
      <text x="265" y="518">AI</text>
      <rect x="290" y="504" width="48" height="20" rx="4" fill="none" stroke="#2a363d"/>
      <text x="314" y="518">SYNC</text>
      <rect x="184" y="532" width="62" height="20" rx="4" fill="none" stroke="#2a363d"/>
      <text x="215" y="546">EDITOR</text>
      <rect x="254" y="532" width="52" height="20" rx="4" fill="none" stroke="#2a363d"/>
      <text x="280" y="546">DATA</text>
      <rect x="184" y="560" width="90" height="20" rx="4" fill="none" stroke="#2a363d"/>
      <text x="229" y="574">APPEARANCE</text>
    </g>

    <text x="184" y="614" font-family="Cascadia Code, monospace" font-size="9.5" letter-spacing="1.8" fill="#63736f">SORT</text>
    <rect x="184" y="624" width="172" height="24" rx="5" fill="#182024" stroke="#2a363d"/>
    <text x="194" y="640" font-family="Cascadia Code, monospace" font-size="10.5" fill="#b4c3bd">Downloads &#9662;</text>
    <text x="184" y="672" font-family="Cascadia Code, monospace" font-size="9.5" fill="#63736f">2,547 PLUGINS</text>

    <!-- card grid: 3 x 2 -->
    <!-- active card -->
    <g>
      <rect x="390" y="422" width="200" height="118" rx="8" fill="#13191c" stroke="#63f2ab"/>
      <rect x="390" y="422" width="3" height="118" rx="1.5" fill="#63f2ab"/>
      <rect x="406" y="440" width="96" height="9" rx="2" fill="#dce4df"/>
      <rect x="406" y="460" width="160" height="6" rx="2" fill="#63736f" opacity="0.6"/>
      <rect x="406" y="472" width="128" height="6" rx="2" fill="#63736f" opacity="0.6"/>
      <text x="406" y="502" font-family="Cascadia Code, monospace" font-size="10.5" fill="#63f2ab">&#8595; 3.4M</text>
      <text x="462" y="502" font-family="Cascadia Code, monospace" font-size="10.5" fill="#879994">2d ago</text>
      <rect x="406" y="512" width="46" height="15" rx="4" fill="none" stroke="#63f2ab" opacity="0.6"/>
      <text x="429" y="523" font-family="Cascadia Code, monospace" font-size="9" fill="#63f2ab" text-anchor="middle">TASKS</text>
    </g>
    <!-- inactive cards -->
    <g>
      <rect x="610" y="422" width="200" height="118" rx="8" fill="#13191c" stroke="#2a363d"/>
      <rect x="626" y="440" width="84" height="9" rx="2" fill="#b4c3bd" opacity="0.85"/>
      <rect x="626" y="460" width="160" height="6" rx="2" fill="#63736f" opacity="0.5"/>
      <rect x="626" y="472" width="110" height="6" rx="2" fill="#63736f" opacity="0.5"/>
      <text x="626" y="502" font-family="Cascadia Code, monospace" font-size="10.5" fill="#879994">&#8595; 1.8M</text>
      <text x="682" y="502" font-family="Cascadia Code, monospace" font-size="10.5" fill="#879994">1w ago</text>
      <rect x="626" y="512" width="34" height="15" rx="4" fill="none" stroke="#2a363d"/>
      <text x="643" y="523" font-family="Cascadia Code, monospace" font-size="9" fill="#879994" text-anchor="middle">AI</text>
    </g>
    <g>
      <rect x="830" y="422" width="200" height="118" rx="8" fill="#13191c" stroke="#2a363d"/>
      <rect x="846" y="440" width="104" height="9" rx="2" fill="#b4c3bd" opacity="0.85"/>
      <rect x="846" y="460" width="150" height="6" rx="2" fill="#63736f" opacity="0.5"/>
      <rect x="846" y="472" width="120" height="6" rx="2" fill="#63736f" opacity="0.5"/>
      <text x="846" y="502" font-family="Cascadia Code, monospace" font-size="10.5" fill="#879994">&#8595; 940k</text>
      <text x="902" y="502" font-family="Cascadia Code, monospace" font-size="10.5" fill="#879994">3d ago</text>
      <rect x="846" y="512" width="46" height="15" rx="4" fill="none" stroke="#2a363d"/>
      <text x="869" y="523" font-family="Cascadia Code, monospace" font-size="9" fill="#879994" text-anchor="middle">SYNC</text>
    </g>
    <g opacity="0.85">
      <rect x="390" y="560" width="200" height="118" rx="8" fill="#13191c" stroke="#2a363d"/>
      <rect x="406" y="578" width="90" height="9" rx="2" fill="#b4c3bd" opacity="0.8"/>
      <rect x="406" y="598" width="155" height="6" rx="2" fill="#63736f" opacity="0.5"/>
      <rect x="406" y="610" width="100" height="6" rx="2" fill="#63736f" opacity="0.5"/>
      <text x="406" y="640" font-family="Cascadia Code, monospace" font-size="10.5" fill="#879994">&#8595; 612k</text>
      <text x="462" y="640" font-family="Cascadia Code, monospace" font-size="10.5" fill="#879994">5d ago</text>
      <rect x="406" y="650" width="52" height="15" rx="4" fill="none" stroke="#2a363d"/>
      <text x="432" y="661" font-family="Cascadia Code, monospace" font-size="9" fill="#879994" text-anchor="middle">DATA</text>
    </g>
    <g opacity="0.65">
      <rect x="610" y="560" width="200" height="118" rx="8" fill="#13191c" stroke="#2a363d"/>
      <rect x="626" y="578" width="78" height="9" rx="2" fill="#b4c3bd" opacity="0.8"/>
      <rect x="626" y="598" width="148" height="6" rx="2" fill="#63736f" opacity="0.5"/>
      <rect x="626" y="610" width="118" height="6" rx="2" fill="#63736f" opacity="0.5"/>
      <text x="626" y="640" font-family="Cascadia Code, monospace" font-size="10.5" fill="#879994">&#8595; 388k</text>
      <text x="682" y="640" font-family="Cascadia Code, monospace" font-size="10.5" fill="#879994">1mo ago</text>
      <rect x="626" y="650" width="62" height="15" rx="4" fill="none" stroke="#2a363d"/>
      <text x="657" y="661" font-family="Cascadia Code, monospace" font-size="9" fill="#879994" text-anchor="middle">EDITOR</text>
    </g>
    <g opacity="0.45">
      <rect x="830" y="560" width="200" height="118" rx="8" fill="#13191c" stroke="#2a363d"/>
      <rect x="846" y="578" width="98" height="9" rx="2" fill="#b4c3bd" opacity="0.8"/>
      <rect x="846" y="598" width="140" height="6" rx="2" fill="#63736f" opacity="0.5"/>
      <rect x="846" y="610" width="126" height="6" rx="2" fill="#63736f" opacity="0.5"/>
      <text x="846" y="640" font-family="Cascadia Code, monospace" font-size="10.5" fill="#879994">&#8595; 105k</text>
      <text x="902" y="640" font-family="Cascadia Code, monospace" font-size="10.5" fill="#879994">2w ago</text>
      <rect x="846" y="650" width="90" height="15" rx="4" fill="none" stroke="#2a363d"/>
      <text x="891" y="661" font-family="Cascadia Code, monospace" font-size="9" fill="#879994" text-anchor="middle">APPEARANCE</text>
    </g>
  </g>

  <!-- ===== Terminal prompt footer ===== -->
  <text x="600" y="762" font-family="Cascadia Code, 'JetBrains Mono', Consolas, monospace" font-size="16" text-anchor="middle">
    <tspan fill="#63f2ab">&#10095;</tspan><tspan fill="#b4c3bd" xml:space="preserve"> store --filter "tasks" --sort downloads</tspan><tspan fill="#63f2ab">&#9612;</tspan>
  </text>
</svg>
